<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title> Kirby Lanche </title>
    </head>
    <body>
        <h1> Cadastro de Usuário </h1>
        <form action="login.html" method="GET">
            <label for="name"> NOME </label><br>
            <input type="text" id="name" name="text" placeholder=" Digite seu nome">
            <br><br>
            <label for="senha"> SENHA </label><br>
            <input type="password" id="senha" name="password" placeholder=" Digite sua senha">
            <br><br>
            <label for="comfirmar_senha"> Comfirme sua Senha </label><br>
            <input type="password" id="comfirmar_senha" name="password" placeholder=" Comfirme sua senha">
            <br><br>
            <label for="email"> E-mail </label><br>
            <input type="email" id="email" name="email" placeholder=" Digite seu email">
            <br><br>
            <input type="submit" value="Cadastra">
        </form>    
    </body>
</html>
